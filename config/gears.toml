[main]
file_path = "../scratch/bin/default.xex"
out_directory_path = "../scratch/ppc"
# Generated by XenonAnalyse into scratch/, then merged with the hand-authored
# entries in config/gears_switch_tables.extra.toml:
#
#   tools/merge_switch_tables.py <xenonanalyse output> \
#       config/gears_switch_tables.extra.toml \
#       scratch/config/gears_switch_tables.toml
#
# The merge is not optional. XenonAnalyse rewrites its output from the image, so
# an entry added to it by hand is destroyed on the next run -- and the authored
# entry is load bearing: without it the render-command executor's dispatch is
# recompiled wrongly and the title crashes in sub_82544148.
switch_table_file_path = "../scratch/config/gears_switch_tables.toml"

# All optimizations off for the first pass, per XenonRecomp README:
# do not enable until there is a working recompilation.
skip_lr = false
skip_msr = false
ctr_as_local = false
xer_as_local = false
reserved_as_local = false
cr_as_local = false
non_argument_as_local = false
non_volatile_as_local = false

# Byte-pattern-scanned from the decompressed image by tools/xex_probe.
restgprlr_14_address = 0x828D2830
savegprlr_14_address = 0x828D27E0
restfpr_14_address   = 0x828D424C
savefpr_14_address   = 0x828D4200
restvmx_14_address   = 0x828D7AF8
savevmx_14_address   = 0x828D7860
restvmx_64_address   = 0x828D7B8C
savevmx_64_address   = 0x828D78F4

# longjmp_address / setjmp_address: not yet located. Omitted deliberately
# rather than guessed -- the recompiler treats them as ordinary functions
# until identified.

# NOTE: 0x825B4EB8 was briefly registered here as a missed function after a
# live indirect call to it hit a null function-table entry. That diagnosis was
# wrong: it is a CASE BLOCK of the unrecognised jump table at 0x825B48F4
# (bctr dispatch, 16 labels), now declared in the switch-table file. Emitting
# a case block as a standalone function runs the parent's shared epilogue
# against a frame that was never built and corrupts the caller's nonvolatile
# registers -- the r24-as-float crash in sub_82544148. Do not re-add case
# labels as functions; identify the owning switch instead.
